[project]
name = "pokemon_tcg_research"
version = "0.1.0"
description = "Sentiment market analysis on Pokemon TCG based on Influenctial Youtubers"
readme = "README.md"
authors = [
    { name = "Ling Zi Jian", email = "lingzijian@hotmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "chromadb",
    "google-api-python-client",
    "pandas",
    "pydantic-settings",
    "sentence-transformers",
    "tqdm",
    "youtube-transcript-api",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "black",
    "ruff",
]
docs = []